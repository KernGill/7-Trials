<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 256">
  <defs>
    <linearGradient id="archFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a3524"/>
      <stop offset="45%" stop-color="#241a14"/>
      <stop offset="100%" stop-color="#020202"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="8%" r="60%">
      <stop offset="0%" stop-color="#ff8a5c" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff8a5c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- stone archway opening, fading to black depth -->
  <path d="M38 46 Q100 -6 162 46 L162 232 L38 232 Z" fill="url(#archFade)" stroke="#5a4632" stroke-width="5"/>
  <path d="M38 46 Q100 -6 162 46 L162 232 L38 232 Z" fill="url(#glow)"/>

  <!-- descending stone steps, narrowing toward the vanishing point -->
  <g stroke="#050403" stroke-opacity="0.65" stroke-width="4" stroke-linecap="round">
    <line x1="66" y1="232" x2="134" y2="232"/>
    <line x1="61" y1="210" x2="139" y2="210"/>
    <line x1="57" y1="186" x2="143" y2="186"/>
    <line x1="53" y1="160" x2="147" y2="160"/>
    <line x1="50" y1="132" x2="150" y2="132"/>
  </g>
  <g stroke="#6b5540" stroke-opacity="0.4" stroke-width="1.5">
    <line x1="66" y1="230" x2="134" y2="230"/>
    <line x1="61" y1="208" x2="139" y2="208"/>
    <line x1="57" y1="184" x2="143" y2="184"/>
    <line x1="53" y1="158" x2="147" y2="158"/>
    <line x1="50" y1="130" x2="150" y2="130"/>
  </g>

  <!-- rough stone arch outline -->
  <path d="M38 46 Q100 -6 162 46" fill="none" stroke="#7a6248" stroke-width="6" stroke-linecap="round"/>
</svg>
